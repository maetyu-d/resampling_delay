name: macOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Configure and build AU
    runs-on: macos-latest

    steps:
      - name: Check out plugin
        uses: actions/checkout@v4

      - name: Check out JUCE
        uses: actions/checkout@v4
        with:
          repository: juce-framework/JUCE
          ref: 8.0.12
          path: JUCE

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DJUCE_DIR="$GITHUB_WORKSPACE/JUCE"

      - name: Build Audio Unit
        run: cmake --build build --config Release --target ResamplingDelay_AU --parallel 3
